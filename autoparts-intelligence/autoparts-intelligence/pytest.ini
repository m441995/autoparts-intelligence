# pytest.ini — AutoParts Intelligence Platform

[pytest]
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*

addopts =
    --strict-markers
    -v
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-fail-under=75

markers =
    slow: marks tests as slow (skipped by default with -m "not slow")
    integration: marks integration tests requiring a real database
